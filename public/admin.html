<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    background: #111827;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.container {
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 12px;
    border: 1px solid #1f2937;
    text-align: left;
}

th {
    background: #1f2937;
}

tr:hover {
    background: #111827;
}

.badge {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
}

.admin {
    background: red;
}

.user {
    background: green;
}
</style>
</head>

<body>

<header>
    ADMIN DASHBOARD 👑
</header>

<div class="container">
    <h3>All Users</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Provider</th>
                <th>Role</th>
            </tr>
        </thead>
        <tbody id="usersTable"></tbody>
    </table>
</div>

<script>
async function loadUsers() {
    try {
        const res = await fetch("http://localhost:3000/admin/users", {
            credentials: "include"
        });

        if (!res.ok) {
            alert("Access denied (Admin only)");
            window.location.href = "/login";
            return;
        }

        const users = await res.json();

        const table = document.getElementById("usersTable");

        table.innerHTML = users.map(u => `
            <tr>
                <td>${u.id}</td>
                <td>${u.username}</td>
                <td>${u.email}</td>
                <td>${u.provider || "local"}</td>
                <td>
                    <span class="badge ${u.role === "admin" ? "admin" : "user"}">
                        ${u.role || "user"}
                    </span>
                </td>
            </tr>
        `).join("");

    } catch (err) {
        console.error(err);
    }
}

loadUsers();
</script>

</body>
</html>
