<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    background: #111827;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 12px;
    border: 1px solid #1f2937;
    text-align: left;
}

th {
    background: #1f2937;
}

tr:hover {
    background: #111827;
}

/* BUTTONS */
.btn {
    padding: 6px 10px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
    margin-right: 5px;
}

.delete {
    background: #ef4444;
    color: white;
}

.promote {
    background: #22c55e;
    color: white;
}

.refresh {
    background: #3b82f6;
    color: white;
    margin-bottom: 10px;
}

.badge {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
}

.admin {
    background: red;
}

.user {
    background: green;
}
</style>
</head>

<body>

<header>
    👑 ADMIN DASHBOARD
</header>

<div class="container">

<button class="btn refresh" onclick="loadUsers()">🔄 Refresh</button>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Provider</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="usersTable"></tbody>
</table>

</div>

<script src="admin.js"></script>

</body>
</html>
