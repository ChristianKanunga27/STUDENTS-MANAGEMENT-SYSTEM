<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.card {
    width: 360px;
    background: #111827;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

#message {
    text-align: center;
    font-size: 14px;
    margin-bottom: 10px;
    min-height: 18px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 6px;
    background: #1f2937;
    color: white;
    outline: none;
    transition: 0.3s;
}

input:focus {
    background: #374151;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
    transform: scale(1.02);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.login-btn {
    background: #3b82f6;
    color: white;
}

.google-btn {
    background: #db4437;
    color: white;
}

.github-btn {
    background: #333;
    color: white;
}

.divider {
    text-align: center;
    margin: 12px 0;
    font-size: 12px;
    color: #9ca3af;
}

.link {
    text-align: center;
    margin-top: 12px;
}

.link a {
    color: #38bdf8;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="card">
    <h2>Welcome Back</h2>

    <!-- MESSAGE BOX -->
    <div id="message"></div>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button id="loginBtn" class="login-btn" onclick="login()">Login</button>

    <div class="divider">OR</div>

    <button class="google-btn" onclick="googleLogin()">Continue with Google</button>
    <button class="github-btn" onclick="githubLogin()">Continue with GitHub</button>

    <div class="link">
        No account? <a href="register.html">Register</a>
    </div>
</div>

<script src="login.js"></script>

</body>
</html>
