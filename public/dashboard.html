<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* BACKGROUND */
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: #111827;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    position: sticky;
    top: 0;
    z-index: 100;
}

/* LOGO */
.logo {
    font-weight: bold;
    font-size: 18px;
}

/* LOGOUT BUTTON (ALWAYS TOP RIGHT) */
.logout-btn {
    background: #ef4444;
    border: none;
    padding: 10px 15px;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    font-size: 14px;
    margin-left: auto;
}

.logout-btn:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

/* PROFILE */
.profile {
    text-align: center;
    margin-top: 25px;
    padding: 20px;
}

.avatar {
    width: 90px;
    height: 90px;
    background: #3b82f6;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: bold;
    margin: 0 auto 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.profile h2 {
    font-size: 22px;
}

.profile p {
    font-size: 14px;
    color: #9ca3af;
}

/* GRID */
.container {
    padding: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: #111827;
    padding: 20px;
    border-radius: 14px;
    transition: 0.3s;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.card:hover {
    transform: translateY(-5px);
    background: #1f2937;
}

.card h2 {
    color: #38bdf8;
    font-size: 18px;
    margin-bottom: 8px;
}

.card p {
    font-size: 13px;
    color: #cbd5e1;
}

/* 📱 TABLET */
@media (max-width: 768px) {
    .container {
        padding: 20px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .navbar {
        padding: 12px 15px;
    }

    .logo {
        font-size: 16px;
    }
}

/* 📱 MOBILE (FIXED NAVBAR - NO STACKING) */
@media (max-width: 480px) {
    .navbar {
        flex-direction: row; /* KEEP ROW */
        justify-content: space-between;
        padding: 12px 15px;
    }

    .logo {
        font-size: 15px;
    }

    .logout-btn {
        padding: 8px 12px;
        font-size: 13px;
    }

    .container {
        padding: 15px;
        grid-template-columns: 1fr;
    }

    .profile h2 {
        font-size: 18px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Student Management System</div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- PROFILE -->
<div class="profile">
    <div class="avatar" id="avatar">U</div>
    <h2 id="username">Loading...</h2>
    <p id="email">Loading...</p>
</div>

<!-- DASHBOARD CARDS -->
<div class="container">
    <div class="card">
        <h2>📚 Courses</h2>
        <p>Manage and view your enrolled courses.</p>
    </div>

    <div class="card">
        <h2>📝 Assignments</h2>
        <p>Check your pending assignments.</p>
    </div>

    <div class="card">
        <h2>📊 Progress</h2>
        <p>Track your academic performance.</p>
    </div>

    <div class="card">
        <h2>⚙ Settings</h2>
        <p>Update your account settings.</p>
    </div>
</div>
<script src="dashboard.js"></script>
</body>
</html>
