<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* BACKGROUND */
body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    padding: 20px;
}

/* CARD */
.card {
    width: 100%;
    max-width: 400px;
    background: #111827;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeIn 0.6s ease;
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 24px;
}

/* MESSAGE */
#message {
    min-height: 18px;
    font-size: 13px;
    margin-bottom: 10px;
    text-align: center;
    color: #fbbf24;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    outline: none;
    background: #1f2937;
    color: white;
    font-size: 14px;
    transition: 0.3s;
}

input:focus {
    background: #374151;
    transform: scale(1.01);
}

/* BUTTON BASE */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: 0.3s;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

button:hover {
    opacity: 0.9;
    transform: scale(1.02);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* BUTTON COLORS */
.register-btn {
    background: #22c55e;
    color: white;
}

.google-btn {
    background: #db4437;
    color: white;
}

.github-btn {
    background: #333;
    color: white;
}

/* ICON */
.icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
}

/* DIVIDER */
.divider {
    margin: 15px 0;
    font-size: 12px;
    color: #9ca3af;
}

/* LINK */
.link {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.link a {
    color: #38bdf8;
    text-decoration: none;
}

.link a:hover {
    text-decoration: underline;
}

/* 📱 MOBILE */
@media (max-width: 480px) {
    .card {
        padding: 20px;
    }

    h2 {
        font-size: 20px;
    }

    input, button {
        font-size: 13px;
        padding: 10px;
    }
}

/* 📱 VERY SMALL SCREENS */
@media (max-width: 320px) {
    .card {
        padding: 15px;
    }
}
</style>

</head>

<body>

<div class="card">
    <h2>Create Account</h2>

    <div id="message"></div>

    <input type="text" id="username" placeholder="Username">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">

    <button class="register-btn" onclick="register()">
        Register
    </button>

    <div class="divider">OR</div>

    <!-- GOOGLE -->
    <button class="google-btn" onclick="googleLogin()">
        <svg class="icon" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20.5H24v7.9h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C33.7 6.1 29.1 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C33.7 6.1 29.1 4 24 4c-7.4 0-13.7 4.1-17.7 10.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5.1l-6.2-5.1C29.3 35.9 26.8 37 24 37c-5.2 0-9.6-3.3-11.3-8L6.1 33C9.9 39.6 16.4 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.5H24v7.9h11.3c-1.1 3.1-4.2 8-11.3 8-5.2 0-9.6-3.3-11.3-8L6.1 33C9.9 39.6 16.4 44 24 44c11.1 0 20-8.9 20-20 0-1.3-.1-2.3-.4-3.5z"/>
        </svg>
        Continue with Google
    </button>

    <!-- GITHUB -->
    <button class="github-btn" onclick="githubLogin()">
        Continue with GitHub
    </button>

    <div class="link">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<script src="register.js"></script>

</body>
</html>
