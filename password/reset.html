<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Background */
body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    padding: 20px;
}

/* Card */
.card {
    width: 100%;
    max-width: 400px;
    background: #111827;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Title */
h2 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 24px;
}

p {
    text-align: center;
    font-size: 13px;
    color: #9ca3af;
    margin-bottom: 15px;
}

/* Message */
#message {
    text-align: center;
    font-size: 13px;
    min-height: 18px;
    margin-bottom: 10px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    background: #1f2937;
    color: white;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
}

input:focus {
    background: #374151;
    transform: scale(1.01);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    background: #3b82f6;
    color: white;
    font-size: 14px;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
    transform: scale(1.02);
}

/* Back link */
.back {
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
}

.back a {
    color: #38bdf8;
    text-decoration: none;
}

.back a:hover {
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 480px) {
    .card {
        padding: 20px;
    }

    h2 {
        font-size: 20px;
    }

    button, input {
        font-size: 13px;
        padding: 10px;
    }
}
</style>
</head>

<body>

<div class="card">

    <h2>Reset Password</h2>
    <p>Enter your new password below</p>

    <div id="message"></div>

    <input type="password" id="password" placeholder="New Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">

    <button onclick="resetPassword()">Update Password</button>

    <div class="back">
        Back to <a href="/login">Login</a>
    </div>

</div>

<script src="reset.js"></script>

</body>
</html>
